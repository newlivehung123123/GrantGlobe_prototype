<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GrantGlobe — Find Funding</title>

  <!-- Inter typeface -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Fuse.js 7.x — fuzzy-search library -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.umd.min.js"></script>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════
       HEADER
  ════════════════════════════════════════════════════════════ -->
  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-header__brand">
        <span class="site-header__logo">GrantGlobe</span>
      </div>
      <p class="site-header__subtitle">Open funding intelligence</p>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════════════════
       MAIN CONTENT
  ════════════════════════════════════════════════════════════ -->
  <main class="site-main">

    <!-- ── Hero / Search ──────────────────────────────────── -->
    <section class="hero">
      <div class="hero__inner">
        <div class="search-wrap">
          <input
            id="search-input"
            class="search-input"
            type="search"
            placeholder="Search grants by keyword, funder, or topic…"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <span id="result-count" class="result-count"></span>
      </div>
    </section>

    <!-- ── Filter strip ──────────────────────────────────── -->
    <section class="filter-strip">
      <div class="filter-strip__inner">

        <select id="filter-status" class="filter-select" aria-label="Filter by status">
          <option value="">All Statuses</option>
        </select>

        <select id="filter-region" class="filter-select" aria-label="Filter by region">
          <option value="">All Regions</option>
        </select>

        <select id="filter-sector" class="filter-select" aria-label="Filter by sector">
          <option value="">All Sectors</option>
        </select>

        <select id="filter-org-type" class="filter-select" aria-label="Filter by organisation type">
          <option value="">All Organisation Types</option>
        </select>

        <button id="reset-filters" class="btn-reset">Clear filters</button>

      </div>
    </section>

    <!-- ── Personalisation bar ───────────────────────────── -->
    <section class="personalize">
      <div class="personalize__inner">
        <div class="personalize__row">
          <button id="personalize-toggle" class="btn-personalize" aria-expanded="false" aria-controls="personalize-panel">
            <span class="btn-personalize__icon" aria-hidden="true">✦</span>
            <span id="personalize-label">Personalise my feed</span>
          </button>
          <div class="personalize__sort">
            <label for="sort-mode" class="personalize__sort-label">Sort by</label>
            <select id="sort-mode" class="filter-select" aria-label="Sort grants by">
              <option value="recommended">Recommended for you</option>
              <option value="toprated">Top rated</option>
              <option value="deadline">Deadline (soonest)</option>
              <option value="funding">Funding (largest)</option>
            </select>
          </div>
        </div>

        <div id="personalize-panel" class="personalize__panel hidden">
          <div class="pz-group">
            <p class="pz-group__label">I am a…</p>
            <div id="pz-stage" class="pz-chips" role="group" aria-label="Career stage"></div>
          </div>
          <div class="pz-group">
            <p class="pz-group__label">Fields I care about <span class="pz-group__hint">(pick any)</span></p>
            <div id="pz-fields" class="pz-chips" role="group" aria-label="Fields of interest"></div>
          </div>
          <div class="pz-group">
            <p class="pz-group__label">Where I'm based / applying from</p>
            <div id="pz-region" class="pz-chips" role="group" aria-label="Region"></div>
          </div>
          <div class="pz-actions">
            <button id="pz-save" class="btn-pz-save">Save &amp; personalise</button>
            <button id="pz-clear" class="btn-pz-clear">Clear preferences</button>
          </div>
        </div>
      </div>
    </section>

    <!-- ── Grant grid ──────────────────────────────────── -->
    <section class="grid-section">
      <div class="grid-section__inner">
        <div id="grant-grid" class="grant-grid"></div>
      </div>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════════════════
       DETAIL MODAL
  ════════════════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div id="modal-content" class="modal-content">
      <button id="modal-close" class="modal-close" aria-label="Close detail panel">✕</button>
      <!-- app.js populates the interior -->
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════════
       FOOTER
  ════════════════════════════════════════════════════════════ -->
  <footer class="site-footer">
    <p>© 2026 GrantGlobe. Data refreshed periodically. Not financial or legal advice.</p>
  </footer>

  <!-- app.js loaded last, deferred -->
  <script src="app.js" defer></script>

</body>
</html>
